    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #6366f1; font-family: sans-serif; font-weight: bold;">
        System Loading...
      </div>
    </div>
    <script>
      // Forcibly unregister all service workers to clear stale cache/interceptors
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(v => console.log('SW Unregistered:', v));
          }
        });
      }
    </script>
